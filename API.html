<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Git Gud IT Services — Book a Service</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root{--accent:#0ea5e9;--success:#16a34a;--danger:#ef4444}
      body{font-family:Inter, Arial, sans-serif;background:#f8fafc;margin:0;padding:20px}
      .wrap{max-width:820px;margin:10px auto;background:#fff;border-radius:10px;padding:18px;box-shadow:0 6px 24px rgba(15,23,42,0.06)}
      h1{margin:0 0 6px;color:#0f172a;font-size:1.3rem}
      p.lead{margin:0 0 14px;color:#475569}
      form .row{display:flex;gap:12px;margin-bottom:12px}
      label{font-size:0.9rem;color:#334155}
      input[type=text],input[type=email],input[type=datetime-local],select,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #e6eef6;background:#fbfeff}
      textarea{min-height:100px;resize:vertical}
      .actions{display:flex;gap:10px;align-items:center;margin-top:8px}
      button{background:var(--accent);color:#fff;padding:10px 14px;border:0;border-radius:8px;cursor:pointer;font-weight:600}
      .muted{color:#64748b;font-size:0.9rem}
      .notice{background:#f1f5f9;padding:10px;border-radius:8px;margin-top:12px;border:1px solid #e6eef6;opacity:0;transition:opacity .35s ease;}
      .notice.show{opacity:1;}
      .loading-overlay{position:absolute;inset:0;background:rgba(8,32,56,0.4);backdrop-filter:blur(2px);display:flex;justify-content:center;align-items:center;opacity:0;visibility:hidden;transition:opacity .3s ease,visibility .3s ease;}
      .loading-overlay.active{opacity:1;visibility:visible;}
      .spinner{width:28px;height:28px;border:4px solid rgba(255,255,255,.3);border-top-color:#0ea5e9;border-radius:50%;animation:spin .7s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      .booking-list{margin-top:16px;opacity:0;transform:translateY(8px);transition:opacity .35s ease,transform .35s ease}
      .booking-list.active{opacity:1;transform:translateY(0)}
      .booking-item{border:1px solid #eef2ff;padding:10px;border-radius:8px;margin-bottom:8px;background:#ffffff}
      .small{font-size:0.85rem;color:#475569}
      .controls{display:flex;gap:8px}
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Book IT Support — Git Gud</h1>
      <p class="lead">Schedule on-site or remote support. Provide details and a preferred date/time — our team will confirm.</p>

      <form id="bookingForm">
        <div class="row">
          <div style="flex:1">
            <label for="name">Full name</label>
            <input id="name" name="name" type="text" placeholder="esteban" required />
          </div>
          <div style="flex:1">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="esteban@example.com" required />
          </div>
        </div>

        <div class="row">
          <div style="flex:1">
            <label for="service">Service type</label>
            <select id="service" name="service">
              <option>Remote Troubleshooting</option>
              <option>On-site Support</option>
              <option>Network Audit</option>
              <option>Hardware Repair</option>
              <option>Custom Consultation</option>
              <option>website creation</option>
              <option>pc installation</option>
            </select>
          </div>
          <div style="flex:1">
            <label for="datetime">Preferred date & time</label>
            <input id="datetime" name="datetime" type="datetime-local" />
          </div>
        </div>

        <div>
          <label for="details">Details / Issue description</label>
          <textarea id="details" name="details" placeholder="Describe the issue briefly"></textarea>
        </div>

        <div class="actions">
          <button type="submit">Submit Booking</button>
          <button type="button" id="viewMyBookings" style="background:#64748b">View My Bookings</button>
    
        </div>
      </form>

      <div id="feedback" class="notice"></div>

      <section class="booking-list" id="myBookings" style="display:none">
        <h3>Your Bookings</h3>
        <div id="bookingsContainer"></div>
        <div class="controls" style="margin-top:8px">
          <button id="exportBtn" type="button">Export My Bookings (JSON)</button>
          <button id="clearMine" type="button" style="background:#ef4444">Clear My Bookings</button>
        </div>
      </section>
      <div id="loadingOverlay" class="loading-overlay"><div class="spinner"></div></div>

     

    <script>
      const STORAGE_KEY = 'gitgud_bookings_v1';

      function loadBookings(){
        try{ const raw = localStorage.getItem(STORAGE_KEY); return raw?JSON.parse(raw):[] }catch(e){return[]}
      }
      function saveBookings(list){ localStorage.setItem(STORAGE_KEY, JSON.stringify(list)) }

      const form = document.getElementById('bookingForm');
      const feedback = document.getElementById('feedback');
      const viewBtn = document.getElementById('viewMyBookings');
      const mySection = document.getElementById('myBookings');
      const container = document.getElementById('bookingsContainer');
      const exportBtn = document.getElementById('exportBtn');
      const clearMine = document.getElementById('clearMine');
      const loadingOverlay = document.getElementById('loadingOverlay');

      function setLoading(on){
        if(on){
          loadingOverlay.classList.add('active');
        } else {
          loadingOverlay.classList.remove('active');
        }
      }

      function showFeedback(message){
        feedback.textContent = message;
        feedback.classList.add('show');
        setTimeout(() => feedback.classList.remove('show'), 3000);
      }

      function renderBookings(filterEmail){
        const all = loadBookings();
        const list = filterEmail ? all.filter(b => b.email === filterEmail) : all;
        container.innerHTML = '';
        if(list.length===0){ container.innerHTML = '<div class="small">No bookings found.</div>'; document.querySelector('.booking-list').classList.add('active'); return }
        list.forEach(b => {
          const div = document.createElement('div');
          div.className='booking-item';
          div.innerHTML = `<strong>${b.name}</strong> — <span class="small">${b.service} • ${b.datetime||'No date'}</span><div class="small">${b.email}</div><div style="margin-top:6px">${b.details||''}</div><div class="small" style="margin-top:6px;color:#94a3b8">Booked: ${new Date(b.created).toLocaleString()}</div>`;
          container.appendChild(div);
        })
      }

      form.addEventListener('submit', async e => {
        e.preventDefault();
        setLoading(true);
        const name = form.name.value.trim();
        const email = form.email.value.trim();
        const service = form.service.value;
        const datetime = form.datetime.value;
        const details = form.details.value.trim();
        if(!name || !email){ setLoading(false); showFeedback('Name and email are required.'); return }

        const booking = { id: Date.now().toString(36), name, email, service, datetime, details, created: Date.now() };
        const all = loadBookings(); all.push(booking); saveBookings(all);

        showFeedback('Booking saved — admins will be notified. You can view your bookings below.');
        form.reset();
        setLoading(false);

        // notify parent (admin iframe) that a new booking was created
        try{ window.parent.postMessage({ type: 'bookingCreated' }, '*') }catch(e){}
      })

      viewBtn.addEventListener('click', ()=>{
        const email = form.email.value.trim();
        mySection.style.display = 'block';
        renderBookings(email || null);
        document.querySelector('.booking-list').classList.add('active');
      })

      exportBtn.addEventListener('click', ()=>{
        const email = form.email.value.trim();
        const all = loadBookings();
        const data = email ? all.filter(b=>b.email===email) : all;
        const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'bookings.json'; a.click(); URL.revokeObjectURL(url);
      })

      clearMine.addEventListener('click', ()=>{
        const email = form.email.value.trim();
        if(!email){ if(!confirm('Clear ALL your bookings (no email provided)?')) return }
        let all = loadBookings();
        if(email) all = all.filter(b=>b.email!==email); else all = [];
        saveBookings(all); renderBookings(email||null); feedback.style.display='block'; feedback.textContent='Bookings cleared.';
      })

      // expose a refresh handler for admin to call via postMessage
      window.addEventListener('message', e=>{
        try{ if(e.data && e.data.type==='refreshBookings') renderBookings(); }catch(_){}
      })
    </script>
  </body>
</html>
